<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Opening Gmail…</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #1a73e8; color: #fff;
    font: 17px/1.45 -apple-system, system-ui, Roboto, sans-serif;
    overscroll-behavior: none;
  }
  /* The whole viewport is one giant tappable surface. iOS WKWebView needs
     a genuine user gesture ON the page for navigator.clipboard.writeText()
     and for custom-scheme (googlegmail://) navigation. Per prior commit
     1e42208, load-time firing is blocked by iOS. So we make the ONE required
     tap as effortless as possible: tap ANYWHERE on the screen. */
  #tap {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    cursor: pointer;
    min-height: 100vh; min-height: 100dvh;
  }
  #tap:active { background: #1557b8; }
  .icon { font-size: 56px; margin-bottom: 12px; line-height: 1; }
  h1 { font-size: 20px; margin: 0 0 6px; font-weight: 700; }
  .subj { font-weight: 500; margin: 0 0 16px; opacity: 0.95;
          word-wrap: break-word; max-width: 90%; }
  .cta {
    background: rgba(255,255,255,0.16);
    border: 2px solid rgba(255,255,255,0.85);
    border-radius: 999px;
    padding: 18px 28px; min-width: 80%;
    font-size: 17px; font-weight: 700;
    margin: 4px 0 14px;
  }
  .hint { font-size: 13px; opacity: 0.85; margin: 0; max-width: 90%; }
  code  { background: rgba(0,0,0,0.25); padding: 1px 6px; border-radius: 4px;
          font-size: 12px; word-break: break-all; }

  /* Small secondary fallback at the very bottom — not the primary surface. */
  .secondary {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    text-align: center;
    background: rgba(0,0,0,0.18);
  }
  .secondary a {
    display: inline-block; padding: 8px 12px;
    color: #fff; text-decoration: none;
    font-size: 13px; font-weight: 600;
    opacity: 0.9;
  }
  .secondary a + a { margin-left: 12px; }

  /* "Done" overlay if we somehow fire both ops and have a moment to show it. */
  #done {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: #0f9d58; color: #fff;
    text-align: center; padding: 24px;
  }
  #done.show { display: flex; }
  #done .icon { font-size: 64px; }
</style>
</head>
<body>
<div id="tap" role="button" tabindex="0" aria-label="Tap to open Gmail — search query will be copied">
  <div class="icon">📨</div>
  <h1>Tap to open Gmail</h1>
  <p class="subj" id="subj">…</p>
  <div class="cta" id="cta">Copy search query + open Gmail</div>
  <p class="hint">One tap. The Gmail app will open with<br>
     <code id="clip"></code> on your clipboard.<br>
     Tap Gmail's search bar → Paste → the email surfaces.</p>
</div>

<div class="secondary">
  <a id="lnk_web">Open Gmail web</a>
  <a id="lnk_bare">Just open Gmail (no copy)</a>
</div>

<div id="done">
  <div>
    <div class="icon">✓</div>
    <p style="margin:12px 0 0;font-weight:700">Search query copied. Opening Gmail…</p>
  </div>
</div>

<script>
(() => {
  const u = new URL(window.location.href);
  const subj = (u.searchParams.get('subj') || '').slice(0, 200);
  const acc  = (u.searchParams.get('acc')  || 'account1').slice(0, 32);
  const uid  = (u.searchParams.get('uid')  || '').slice(0, 32);
  const addr = (u.searchParams.get('addr') || '').slice(0, 128);
  const frm  = (u.searchParams.get('frm')  || '').slice(0, 80);
  // thid + msgid retained for future thread-deep-link experiments;
  // not used by the current Gmail iOS scheme.
  // const thid  = (u.searchParams.get('thid')  || '').trim().slice(0, 24);
  // const msgid = (u.searchParams.get('msgid') || '').slice(0, 200);

  // Account index (for the Gmail web fallback only)
  const aMatch = /^account(\d+)$/i.exec(acc);
  const uIdx = aMatch ? (Math.max(1, parseInt(aMatch[1], 10)) - 1) : 0;

  // Clipboard payload: Gmail-search-optimal `from:<addr> <subject>`
  const subjClean = subj.trim();
  let clipPayload;
  if (addr && subjClean)      clipPayload = `from:${addr} ${subjClean}`;
  else if (subjClean)        clipPayload = subjClean;
  else if (addr)             clipPayload = `from:${addr}`;
  else                       clipPayload = '';

  // Render
  document.getElementById('subj').textContent = subj || 'this email';
  document.getElementById('clip').textContent = clipPayload || '(no query)';

  const ENC_SUBJ = encodeURIComponent(subj);
  const BARE     = 'googlegmail://';
  const WEB_SRCH = `https://mail.google.com/mail/u/${uIdx}/#search/${ENC_SUBJ}`;

  // Secondary fallback links
  document.getElementById('lnk_web').href  = WEB_SRCH;
  document.getElementById('lnk_bare').href = BARE;

  // Disable the primary surface entirely if there's nothing to copy and we only
  // want to fire the bare scheme — still one-tap-to-open, just simpler text.
  if (!clipPayload) {
    document.getElementById('cta').textContent = 'Open Gmail app';
    document.getElementById('clip').textContent = '(no query — just opening the app)';
  }

  let fired = false;  // guard against double-fire on rapid taps

  async function fire() {
    if (fired) return;
    fired = true;
    // Copy → then open the Gmail app via the bare scheme. Both ops inside the
    // user-gesture handler — iOS requires this; load-time firing is blocked.
    let copied = false;
    if (clipPayload) {
      try {
        await navigator.clipboard.writeText(clipPayload);
        copied = true;
      } catch (e1) {
        // Fallback for older iOS / WebView without async Clipboard API
        try {
          const ta = document.createElement('textarea');
          ta.value = clipPayload;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.top = '-1000px';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
          copied = document.execCommand('copy');
          document.body.removeChild(ta);
        } catch (e2) { copied = false; }
      }
    }
    if (copied) {
      const done = document.getElementById('done');
      done.classList.add('show');
    }
    // 50ms micro-delay lets the clipboard write settle + the "✓" overlay paint
    // before iOS rips focus to the Gmail app.
    setTimeout(() => { window.location.href = BARE; }, 50);
  }

  // Primary surface: tap ANYWHERE → fire.
  const tap = document.getElementById('tap');
  tap.addEventListener('click', fire);
  tap.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fire(); }
  });
})();
</script>
</body>
</html>
