<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="robots" content="noindex">
<title>Opening Gmail…</title>
<style>
  body { font:16px/1.4 -apple-system,system-ui,Roboto,sans-serif; margin:0; padding:24px;
         background:#fff; color:#202124; }
  .card { max-width:540px; margin:8vh auto 0; padding:24px; border-radius:14px;
          background:#f6f8fc; border:1px solid #dadce0; text-align:center; }
  h1 { font-size:18px; margin:0 0 8px; }
  p { margin:8px 0; color:#5f6368; font-size:14px; }
  code { background:#e8eaed; padding:2px 6px; border-radius:4px; font-size:13px; }
  a.btn { display:inline-block; margin-top:18px; padding:14px 22px; background:#1a73e8;
          color:#fff; text-decoration:none; border-radius:999px; font-weight:600;
          font-size:15px; min-width:220px; }
  .subj { font-weight:600; color:#202124; word-wrap:break-word; }
</style>
</head>
<body>
<div class="card">
  <h1>📨 Open in Gmail</h1>
  <p class="subj" id="subj">…</p>
  <p><code id="acc">account1</code> · UID <code id="uid">—</code></p>
  <p id="status">Opening Gmail app…</p>
  <a id="fallback" class="btn" style="display:none" href="googlegmail://">Open Gmail app</a>
  <a id="web" class="btn" style="display:none;background:#5f6368;margin-left:8px"
     href="#" rel="noopener">Open Gmail web</a>
</div>
<script>
(() => {
  // Read query params
  const u = new URL(window.location.href);
  // Decoding once is enough — URLSearchParams already decodes.
  const subj = (u.searchParams.get('subj') || '').slice(0, 200);
  const acc  = (u.searchParams.get('acc')  || 'account1').slice(0, 32);
  const uid  = (u.searchParams.get('uid')  || '').slice(0, 32);
  document.getElementById('subj').textContent = subj || 'this email';
  document.getElementById('acc').textContent  = acc;
  document.getElementById('uid').textContent  = uid || '—';
  // Web-search fallback URL with subject pre-filled.
  const enc = encodeURIComponent(subj);
  document.getElementById('web').href =
    'https://mail.google.com/u/' + (acc === 'account2' ? '1' : '0') +
    '/#search/' + enc;
  document.getElementById('fallback').href = 'googlegmail://';

  // Detect platform. Telegram's inline-button tap on iOS loads this page in
  // WKWebView and the user-gesture chain carries over: a JS-launched
  // window.location to a custom scheme IS routed into the registered app.
  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);

  // Gmail iOS registers the custom scheme `googlegmail:` (per the publicly
  // documented IntentKit Gmail.plist and EmailLink's Info.plist whitelist).
  // Bare scheme launches the Gmail app. We can't deep-link to a specific
  // message without OAuth, so the app opens to inbox; user taps the search
  // icon and the visible subject narrows to the right thread.
  let target = null;
  if (isIOS) {
    target = 'googlegmail://';
  } else if (isAndroid) {
    // Android intent — opens Gmail app package directly.
    target = 'intent://com.google.android.gm/#Intent;scheme=googlegmail;' +
             'package=com.google.android.gm;S.query=' + enc + ';end';
  }

  const statusEl = document.getElementById('status');
  const fallback = document.getElementById('fallback');
  const web = document.getElementById('web');

  if (target) {
    // Hide the page first so the app switch is visually clean
    // (Safari's "Open in app?" banner covers a brief flash of our HTML).
    document.body.style.transition = 'opacity 0.18s ease';
    document.body.style.opacity = '0.5';

    // Two parallel mechanisms to nudge iOS into the app:
    // 1) iframe src = custom scheme — bypasses iOS's JS location-navigate
    //    suppression in some flows.
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = target;
    document.body.appendChild(iframe);

    // 2) window.location directly — this navigates the WKWebView to the
    // custom scheme, which iOS hands to LSApplicationWorkspace. The user
    // sees a brief iOS prompt or auto-switches to Gmail.
    setTimeout(() => { window.location = target; }, 60);

    // Reveal the manual fallback after a delay in case the auto-attempt
    // didn't trigger (e.g. user tapped "Cancel" on iOS prompt, or app was
    // uninstalled).
    setTimeout(() => {
      if (document.visibilityState === 'visible') {
        statusEl.textContent = "If your Gmail app didn't open automatically, tap below:";
        fallback.style.display = 'inline-block';
        web.style.display = 'inline-block';
        document.body.style.opacity = '1';
      }
    }, 1500);
  } else {
    // Desktop / unknown platform — show manual buttons; clicking the iOS
    // custom-scheme button may still work if the user is on an iPad-page.
    statusEl.textContent = 'Tap below to open Gmail:';
    fallback.style.display = 'inline-block';
    web.style.display = 'inline-block';
  }
})();
</script>
</body>
</html>
